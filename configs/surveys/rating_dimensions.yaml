scale:
  min: 1
  max: 5
  labels:
    1: strongly disagree
    5: strongly agree

dimensions:
  clarity: "Easy to understand."
  specificity: "Specific to the position."
  coherence: "Logical and consistent reasoning."
  helpfulness: "Helps me learn why the move is good."
  groundedness: "Grounded in concrete board features or lines."
  genericity_rev: "Sounds generic or boilerplate. (reverse-coded)"
  convincingness: "Sounds convincing."
overall: "Overall explanation quality."
